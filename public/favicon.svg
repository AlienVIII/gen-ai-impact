<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
>
  <rect
    width="64"
    height="64"
    rx="14"
    fill="#F4EBD2"
  />

  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="Inter, system-ui, sans-serif"
    font-size="36"
    font-weight="900"
    fill="#7A4F34"
  >
    >

    <set
      attributeName="visibility"
      to="hidden"
      begin="0.6s"
      dur="0.6s"
      repeatCount="indefinite"
    />
  </text>

  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="Inter, system-ui, sans-serif"
    font-size="36"
    font-weight="900"
    fill="#7A4F34"
    visibility="hidden"
  >
    _

    <set
      attributeName="visibility"
      to="visible"
      begin="0.6s"
      dur="0.6s"
      repeatCount="indefinite"
    />
  </text>
</svg>